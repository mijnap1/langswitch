<svg viewBox="0 0 56 56" xmlns="http://www.w3.org/2000/svg" fill="none">
  <!-- Background -->
  <rect width="56" height="56" rx="14" fill="#0a0a0a"/>

  <!-- Latin "A" — faded, representing mistyped input -->
  <text
    x="10" y="36"
    font-family="Inter, -apple-system, BlinkMacSystemFont, sans-serif"
    font-weight="700"
    font-size="21"
    fill="white"
    opacity="0.28"
    letter-spacing="-0.5"
  >A</text>

  <!-- Arrow -->
  <line x1="24" y1="28" x2="32" y2="28" stroke="white" stroke-width="1.4" stroke-opacity="0.45" stroke-linecap="round"/>
  <polyline points="29.5,25 32.5,28 29.5,31" stroke="white" stroke-width="1.4" stroke-opacity="0.45" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Korean "가" — solid white, the correct output -->
  <text
    x="33" y="37"
    font-family="Apple SD Gothic Neo, Noto Sans KR, sans-serif"
    font-weight="500"
    font-size="20"
    fill="white"
  >가</text>
</svg>
